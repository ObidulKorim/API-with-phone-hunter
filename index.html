<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Hunting API</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <header>
        <h2 class="text-6xl">
            Hunting Phone</h2>
    </header>
    <main class="container mx-auto mt-8">
        <section class="p-4 m-4 bg-slate-100">
            <input id="search-field" type="text" placeholder="Search here" class="input" />
            <button onclick="searchHandle()" class="btn btn-accent">Search</button>

        </section>
        <section>
            <div id="loading-spinner" class="text-center my-40 hidden">
                <span class="loading loading-spinner loading-xl "></span>
            </div>
            <div id="phone-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
               
            </div>
            <div id="show-all-container" class="hidden text-center my-8">
                <button class="btn btn-accent">Show All</button>
            </div>
        </section>
    </main>
    <footer>

    </footer>

    <script src="js/phone.js"></script>
     <!-- <script src="js/phone2.js"></script> -->
</body>


</html>
